<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>힐링로드</title>
    <script>
      // GitHub Pages SPA 라우팅 - 404를 index.html로 리다이렉트
      // 참고: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // /healingroad/ 서브디렉토리이므로 1
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?p=/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search
            ? "&q=" + l.search.slice(1).replace(/&/g, "~and~")
            : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
